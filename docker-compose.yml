services:
  api:
    build:
      context: .
      target: api
    environment:
      PORT: 4000
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      target: web
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api
