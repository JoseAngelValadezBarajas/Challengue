openapi: 3.1.0
info:
  title: Meltwater Redaction API
  version: 1.0.0
  description: API for redacting document text and restoring it with a non-cryptographic key.
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /redactions:
    post:
      summary: Redact a document
      description: Replaces every matching keyword or phrase with XXXX and returns a reversible key.
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedactionRequest"
            examples:
              assignment:
                value:
                  terms: "Hello world \u201cBoston Red Sox\u201d, \u2018Pepperoni Pizza\u2019, \u2018Cheese Pizza\u2019, beer"
                  documentText: "Hello world watched the Boston Red Sox and ordered beer."
      responses:
        "201":
          description: Document redacted successfully.
          headers:
            x-request-id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedactionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          $ref: "#/components/responses/DomainError"
  /unredactions:
    post:
      summary: Unredact a document
      description: Restores XXXX placeholders using a key generated by the redaction endpoint.
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnredactionRequest"
      responses:
        "200":
          description: Document restored successfully.
          headers:
            x-request-id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnredactionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          $ref: "#/components/responses/DomainError"
components:
  parameters:
    RequestId:
      name: x-request-id
      in: header
      required: false
      schema:
        type: string
      description: Optional caller-provided correlation id.
  headers:
    RequestId:
      description: Request correlation id.
      schema:
        type: string
  responses:
    ValidationError:
      description: Request payload is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainError:
      description: Redaction domain error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    RedactionRequest:
      type: object
      required: [terms, documentText]
      properties:
        terms:
          type: string
          minLength: 1
        documentText:
          type: string
    RedactionResponse:
      type: object
      required: [redactedText, key, redactions]
      properties:
        redactedText:
          type: string
          example: "XXXX XXXX watched the XXXX and ordered XXXX."
        key:
          type: string
        redactions:
          type: array
          items:
            $ref: "#/components/schemas/RedactionEntry"
    RedactionEntry:
      type: object
      required: [index, start, end, term, original]
      properties:
        index:
          type: integer
        start:
          type: integer
        end:
          type: integer
        term:
          type: string
        original:
          type: string
    UnredactionRequest:
      type: object
      required: [key, documentText]
      properties:
        key:
          type: string
          minLength: 1
        documentText:
          type: string
    UnredactionResponse:
      type: object
      required: [unredactedText]
      properties:
        unredactedText:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
